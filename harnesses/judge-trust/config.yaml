# Judge-Trust POC — run configuration
n_mcq: 40            # clean MCQ items to generate (before injection)
n_frq: 10            # clean FRQ items to generate
seed: 42             # seeds the deterministic injection/shuffle (reproducible)
defect_frac: 0.5     # fraction of items that receive a deterministic defect
families: claude,codex,grok,gemini   # independent vendor families (generators AND judges)
batch_size: 8        # items per judge CLI call
spec_floor: 0.8      # graduation: minimum specificity
sens_target: 0.9     # graduation: minimum sensitivity
