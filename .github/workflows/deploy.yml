name: build-scan-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege; Pages deploy needs these.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      # GATE 1 — source must be clean. Fails the job (no deploy) on any finding.
      - name: Firewall scan (source)
        run: node scripts/firewall-scan.mjs .
      - name: Build
        run: node build.mjs
      # GATE 2 — built output must be clean before it can ship.
      - name: Firewall scan (dist)
        run: node scripts/firewall-scan.mjs dist
      - name: Regression tests
        run: node tests/firewall-scan.test.mjs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
